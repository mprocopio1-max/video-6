<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Video Full Screen</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: block;
    }
  </style>
</head>

<body>
  <video autoplay muted loop playsinline>
    <source src="successo.hevc.mp4" type="video/mp4" />
    Il tuo browser non supporta il video.
  </video>
</body>
</html>
